<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Crear cuenta</h1>
      <p>Únete a la comunidad natural</p>
    </div>

    @if (error) {
      <div class="alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="registro()">
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" [(ngModel)]="nombre" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" name="confirmar" [(ngModel)]="confirmar" placeholder="Repite tu contraseña" required>
      </div>

      <button type="submit" class="btn-submit" [disabled]="cargando">
        @if (cargando) { <span class="btn-spinner"></span> } Crear cuenta
      </button>
    </form>

    <p class="auth-switch">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Iniciar sesión</a>
    </p>
  </div>
</div>
